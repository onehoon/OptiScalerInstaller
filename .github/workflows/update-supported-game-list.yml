name: Update Supported Game List

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-supported-game-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      INSTALL_PROFILE_SHEET_URL: ${{ secrets.INSTALL_PROFILE_SHEET_URL }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
      TARGET_WIKI_PAGE_FILE: Supported-Game-List.md
      BASELINE_WIKI_PAGE_FILE: Supported-Game-List.md
      NEW_GAMES_RETENTION_DAYS: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install --disable-pip-version-check requests google-auth

      - name: Update wiki page
        run: python scripts/update_supported_game_list.py
